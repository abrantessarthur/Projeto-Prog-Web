<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel do Bibliotecário</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <h1>Painel do Bibliotecário</h1>
    <button onclick="logout()" class="btn-danger">Sair</button>

    <h2>Cadastrar / Editar Livro</h2>
    <form id="livro-form">
        <input type="hidden" id="livro-id">
        <div class="form-group">
            <label>Título:</label>
            <input type="text" id="titulo" required>
        </div>
        <div class="form-group">
            <label>Autor:</label>
            <input type="text" id="autor" required>
        </div>
        <div class="form-group">
            <label>Ano de Publicação:</label>
            <input type="number" id="ano_publicacao" required>
        </div>
        <div class="form-group">
            <label>Quantidade Disponível:</label>
            <input type="number" id="quantidade_disponivel" required>
        </div>
        <button type="submit" id="btn-submit-livro" class="btn-success" style="width: 100%;">Salvar Livro</button>
    </form>

    <h2>Listagem de Livros</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th><th>Título</th><th>Autor</th><th>Ano</th><th>Qtd Disponível</th><th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabela-livros"></tbody>
    </table>

    <h2>Listagem de Empréstimos Ativos</h2>
    <table>
        <thead>
            <tr>
                <th>ID Empréstimo</th><th>ID Leitor</th><th>ID Livro</th><th>Data Empréstimo</th><th>Data Prevista</th><th>Status</th><th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabela-emprestimos"></tbody>
    </table>

    <script src="/js/bibliotecario.js"></script>
</body>
</html>
